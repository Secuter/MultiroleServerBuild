name: linux-release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write

env:
  UPSTREAM_REPO: DyXel/Multirole
  RELEASE_TAG: continuous
  RELEASE_ASSET: multirole-linux-x64.tar.gz

jobs:
  build-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout CI repository
        uses: actions/checkout@v4

      - name: Checkout upstream source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          path: upstream
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get --yes --no-install-recommends install software-properties-common
          sudo add-apt-repository --yes ppa:mhier/libboost-latest
          sudo apt-get update
          sudo apt-get --yes --no-install-recommends install \
            clang \
            libfmt-dev \
            libgit2-dev \
            libsqlite3-dev \
            libssl-dev \
            libboost1.83-dev \
            ninja-build \
            python3-pip
          python3 -m pip install --user meson
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # PPA installs headers to /usr/include/boost1.83/ — symlink to standard path so meson can find them
          sudo ln -sfn /usr/include/boost1.83/boost /usr/include/boost

      - name: Meson build
        working-directory: upstream
        run: |
          export CC=clang
          export CXX=clang++
          meson setup build -Dwarning_level=3
          meson compile -C build -j"$(nproc)"

      - name: Inject secrets into config
        run: |
          sed -i 's/__WEBHOOK_TOKEN__/${{ secrets.WEBHOOK_TOKEN }}/g' config.json

      - name: Package artifact
        run: |
          mkdir -p dist/package
          cp upstream/build/multirole dist/package/
          cp upstream/build/hornet dist/package/
          cp config.json dist/package/
          cp upstream/util/area-zero.sh dist/package/
          chmod +x dist/package/multirole dist/package/hornet dist/package/area-zero.sh
          tar -C dist/package -czf "dist/${RELEASE_ASSET}" .

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Continuous Linux Build
          body: |
            Automated build from `${{ env.UPSTREAM_REPO }}`.
            Asset: `${{ env.RELEASE_ASSET }}`
          prerelease: true
          files: dist/${{ env.RELEASE_ASSET }}
          overwrite_files: true
