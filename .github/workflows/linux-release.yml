name: linux-release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write

env:
  UPSTREAM_REPO: DyXel/Multirole
  RELEASE_ASSET: multirole-linux-x64.tar.gz

jobs:
  build-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout CI repository
        uses: actions/checkout@v4

      - name: Checkout upstream source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          path: upstream
          fetch-depth: 1

      - name: Check if upstream changed
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_SHA=$(git -C upstream rev-parse HEAD)
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          BUILD_NUM=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1000 --json tagName --jq 'length' 2>/dev/null || echo "0")
          echo "build_num=$((BUILD_NUM + 1))" >> "$GITHUB_OUTPUT"
          # Always build on manual trigger; otherwise only if upstream changed
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — forcing build."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            LAST_SHA=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
            LAST_BODY=$(gh release view "$LAST_SHA" --repo "$GITHUB_REPOSITORY" --json body --jq '.body' 2>/dev/null || echo "")
            if echo "$LAST_BODY" | grep -q "$UPSTREAM_SHA"; then
              echo "No upstream changes since last build — skipping."
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "Upstream changed — proceeding with build."
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Install dependencies
        if: steps.check.outputs.changed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get --yes --no-install-recommends install \
            clang \
            libfmt-dev \
            libgit2-dev \
            libsqlite3-dev \
            libssl-dev \
            ninja-build \
            python3-pip \
            wget
          python3 -m pip install --user meson
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build Boost
        if: steps.check.outputs.changed == 'true'
        run: |
          wget -q https://archives.boost.io/release/1.90.0/source/boost_1_90_0.tar.gz
          tar xzf boost_1_90_0.tar.gz
          cd boost_1_90_0
          ./bootstrap.sh --with-toolset=clang
          sudo ./b2 toolset=clang install --prefix=/usr/local -j"$(nproc)" 2>&1 | tail -5

      - name: Meson build
        if: steps.check.outputs.changed == 'true'
        working-directory: upstream
        run: |
          export CC=clang
          export CXX=clang++
          meson setup build -Dwarning_level=3
          meson compile -C build -j"$(nproc)"

      - name: Package artifact
        if: steps.check.outputs.changed == 'true'
        run: |
          mkdir -p dist/package
          cp upstream/build/multirole dist/package/
          cp upstream/build/hornet dist/package/
          cp upstream/util/area-zero.sh dist/package/
          echo "==> Boost libs in /usr/local/lib:"
          ls /usr/local/lib/libboost*.so* || echo "NONE FOUND"
          echo "==> Boost libs needed by binaries:"
          ldd upstream/build/multirole upstream/build/hornet | grep boost || echo "NONE"
          cp /usr/local/lib/libboost*.so.* dist/package/
          echo "==> Package contents:"
          ls dist/package/
          chmod +x dist/package/multirole dist/package/hornet dist/package/area-zero.sh
          tar -C dist/package -czf "dist/${RELEASE_ASSET}" .

      - name: Publish release asset
        if: steps.check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.check.outputs.build_num }}
          name: Build ${{ steps.check.outputs.build_num }}
          body: |
            Automated build from [`${{ env.UPSTREAM_REPO }}`](https://github.com/${{ env.UPSTREAM_REPO }}/commit/${{ steps.check.outputs.upstream_sha }})
            Upstream commit: `${{ steps.check.outputs.upstream_sha }}`
          prerelease: false
          files: dist/${{ env.RELEASE_ASSET }}
